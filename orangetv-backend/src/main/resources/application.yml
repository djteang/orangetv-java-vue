    client-id: ${LINUXDO_CLIENT_ID:0YxsaEQ5CQ0xtUDi3ZLeKBviumiVN4dO}
    client-secret: ${LINUXDO_CLIENT_SECRET:wjfDIKy1ItMVhOWaZOjJXS22URypatHZ}
    redirect-uri: ${LINUXDO_REDIRECT_URI:http://g9dbc62c.natappfree.cc/api/auth/linuxdo/callback}

# Frontend URL
